<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tastenote</title>
  <style>
    /* Theme: neutral dark base + single muted accent (casual, not game-like) */
    * { box-sizing: border-box; }
    :root {
      --bg: #1c1b22;
      --bg-subtle: #22212a;
      --text: #e6e6e8;
      --text-muted: #8a8a8e;
      --surface: rgba(255,255,255,0.055);
      --border: rgba(255,255,255,0.12);
      --accent: #9a6dd7;
      --accent-hover: #b092e6;
      --accent-muted: rgba(154,109,215,0.25);
      --accent-border: rgba(154,109,215,0.55);
    }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      max-width: 32rem;
      margin: 0 auto;
      padding: 1.5rem 1.25rem;
      min-height: 100vh;
      /* More "paper-like": flat background with subtle ambient glow */
      background: var(--bg);
      background-image: radial-gradient(1200px circle at 50% -20%, rgba(154, 109, 215, 0.10) 0%, rgba(154, 109, 215, 0) 55%);
      color: var(--text);
      text-align: center;
    }
    .top-actions {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      justify-content: flex-end;
    }
    .lang-toggle {
      padding: 0.35rem 0.6rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .lang-toggle:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.14); }
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      margin-bottom: 1.5rem;
    }
    .header-icon { font-size: 1.75rem; }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .tagline {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text-muted);
      margin: 0;
      letter-spacing: 0.02em;
    }
    .nav {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .nav a {
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      text-decoration: none;
      transition: color 0.2s, background 0.2s, border-color 0.2s;
    }
    .nav a:hover { color: var(--text); background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.14); }
    .nav a.active { color: var(--accent); background: var(--accent-muted); border-color: var(--accent-border); }
    .repertoire-list {
      text-align: left;
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .repertoire-list li {
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .repertoire-list li:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.12);
    }
    .repertoire-list .note-title { font-weight: 600; color: var(--text); margin-bottom: 0.2rem; }
    .repertoire-list .note-meta { font-size: 0.8rem; color: var(--text-muted); }
    .repertoire-back {
      margin-bottom: 1rem;
      text-align: left;
    }
    .repertoire-back a {
      font-size: 0.9rem;
      color: var(--accent);
      text-decoration: none;
    }
    .repertoire-back a:hover { text-decoration: underline; }
    .buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    .start-btn {
      width: 100%;
      max-width: 18rem;
      padding: 0.7rem 1.2rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .start-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.14);
    }
    .start-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .capture-btn {
      width: 100%;
      max-width: 18rem;
      padding: 1.25rem 1.75rem;
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .capture-btn:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: scale(1.01);
    }
    .capture-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .mode-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 1rem;
      margin-bottom: 0.25rem;
    }
    .manual-btn {
      width: 100%;
      max-width: 18rem;
      padding: 0.65rem 1.1rem;
      font-size: 0.875rem;
      font-weight: 600;
      border-radius: 0.75rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
    }
    .manual-start {
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .manual-start:hover:not(:disabled) {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.14);
    }
    .manual-stop {
      color: #fff;
      background: var(--accent);
      border: none;
      transition: background 0.2s, transform 0.1s;
    }
    .manual-stop:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: scale(1.01);
    }
    .manual-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .status {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      min-height: 1.2rem;
    }
    .status.error { color: #c97a6e; }
    .result {
      margin-top: 2rem;
      padding: 1.5rem;
      background: var(--surface);
      border-radius: 1rem;
      border: 1px solid var(--border);
    }
    .result h2 {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      margin: 0 0 0.5rem 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .result .text {
      font-size: 0.9rem;
      line-height: 1.55;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0 0 1rem 0;
    }
    .result .text:last-of-type { margin-bottom: 0; }
    .result .text { text-align: left; }
    .result h2 { text-align: left; }
    .result .summary { margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--border); }
    .viz-section {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .viz-section h3 {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      margin: 0 0 0.75rem 0;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .wheel-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .wheel-wrap:last-of-type { margin-bottom: 0; }
    .wheel-svg {
      max-width: 100%;
      height: auto;
    }
    .wheel-legend {
      margin-top: 0.75rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .wheel-legend span { display: inline-flex; align-items: center; gap: 0.25rem; }
    .wheel-legend .dot { width: 6px; height: 6px; border-radius: 50%; }
    .wheel-legend .legend-radar { margin-left: 0.5rem; color: var(--accent); }

    /* Tasting wheel: full 360° wheel */
    .wheel-fan {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .wheel-fan svg {
      max-width: 100%;
      height: auto;
    }
    .wheel-fan svg text {
      transition: opacity 0.25s ease-out;
    }

    /* Radar polygon: animated via JS (class toggled when animation done) */
    .radar-polygon {
      transition: opacity 0.2s;
    }
  </style>
</head>
<body>
  <div class="top-actions">
    <button type="button" class="lang-toggle" id="langToggle" aria-label="Toggle language">EN</button>
  </div>
  <div class="header">
    <span class="header-icon" aria-hidden="true">🍷</span>
    <h1>Tastenote</h1>
    <p class="tagline">Say what you taste.</p>
  </div>
  <nav class="nav" aria-label="Main">
    <a href="#" id="navCapture" class="active">Capture</a>
    <a href="#" id="navRepertoire">Repertoire</a>
  </nav>
  <div id="captureView">
  <div class="buttons">
    <button type="button" class="start-btn" id="startBtn" hidden>▶ Start 30s buffer</button>
    <button type="button" class="capture-btn" id="captureBtn" disabled hidden>Capture last 30s</button>
    <p class="mode-label">Record when ready</p>
    <button type="button" class="manual-btn manual-start" id="manualStartBtn">▶ Start manual record</button>
    <button type="button" class="manual-btn manual-stop" id="manualStopBtn" disabled>⏹ Stop & send</button>
  </div>
  <p class="status" id="status" aria-live="polite"></p>
  </div>
  <div id="repertoireView" hidden>
    <div id="repertoireList"></div>
    <div class="repertoire-back" id="repertoireBack" hidden><a href="#" id="backToList">← Back to list</a></div>
  </div>
  <div class="result" id="result" hidden>
    <h2>What you said</h2>
    <p class="text" id="transcription"></p>
    <h2 class="summary">Tasting summary</h2>
    <p class="text" id="textSummary"></p>
    <div class="viz-section">
      <h3>Tasting wheel</h3>
      <div class="wheel-fan" id="wheelFan" aria-label="Tasting wheel by flavor"></div>
      <h3>Radar chart</h3>
      <div class="wheel-wrap">
        <svg class="wheel-svg" id="radarSvg" viewBox="0 0 260 260" aria-label="Radar chart"></svg>
      </div>
      <div class="wheel-legend" id="wheelLegend"></div>
    </div>
  </div>

  <script>
    (function () {
      const CAPTURE_DURATION_SEC = 30;
      const MANUAL_MAX_SEC = 5 * 60;

      let stream = null;
      let recorder = null;
      let isRecording = false;
      let chunks = [];
      let rollingMode = false;
      let manualMode = false;
      let manualSeconds = 0;
      let manualTimer = null;

      let uiLang = (localStorage.getItem("uiLang") || "en").toLowerCase();
      let lastResultData = null;

      const startBtn = document.getElementById("startBtn");
      const captureBtn = document.getElementById("captureBtn");
      const manualStartBtn = document.getElementById("manualStartBtn");
      const manualStopBtn = document.getElementById("manualStopBtn");
      const statusEl = document.getElementById("status");
      const resultEl = document.getElementById("result");
      const transcriptionEl = document.getElementById("transcription");
      const textSummaryEl = document.getElementById("textSummary");
      const wheelFan = document.getElementById("wheelFan");
      const radarSvg = document.getElementById("radarSvg");
      const wheelLegend = document.getElementById("wheelLegend");
      const captureView = document.getElementById("captureView");
      const repertoireView = document.getElementById("repertoireView");
      const repertoireList = document.getElementById("repertoireList");
      const repertoireBack = document.getElementById("repertoireBack");
      const navCapture = document.getElementById("navCapture");
      const navRepertoire = document.getElementById("navRepertoire");
      const langToggle = document.getElementById("langToggle");
      const modeLabelEl = captureView.querySelector(".mode-label");
      const resultWhatEl = resultEl.querySelector("h2:not(.summary)");
      const resultSummaryEl = resultEl.querySelector("h2.summary");
      const backToListLink = document.getElementById("backToList");

      // 8 categories (Whisky Magazine / Council of Whiskey Masters style). See NOTES.md.
      const WHEEL_CATEGORIES = ["Cereal", "Fruity", "Floral", "Peaty", "Feinty", "Sulphury", "Woody", "Winey"];
      const WHEEL_COLORS = {
        Cereal: "#c4a574",
        Fruity: "#c94b6c",
        Floral: "#b88bb8",
        Peaty: "#5c5048",
        Feinty: "#9a7b5a",
        Sulphury: "#8b7355",
        Woody: "#5c4033",
        Winey: "#8b3a62",
      };

      const WHEEL_LABELS = {
        en: {
          Cereal: "Cereal",
          Fruity: "Fruity",
          Floral: "Floral",
          Peaty: "Peaty",
          Feinty: "Feinty",
          Sulphury: "Sulphury",
          Woody: "Woody",
          Winey: "Winey",
        },
        zh: {
          Cereal: "穀物",
          Fruity: "果香",
          Floral: "花香",
          Peaty: "泥煤",
          Feinty: "雜味",
          Sulphury: "硫磺",
          Woody: "木質",
          Winey: "酒香",
        },
      };

      function setStatus(text, isError) {
        statusEl.textContent = text;
        statusEl.classList.toggle("error", !!isError);
      }

      function pickMimeType() {
        const candidates = [
          "audio/webm;codecs=opus",
          "audio/webm",
          "audio/ogg;codecs=opus",
          "audio/ogg",
        ];
        for (let i = 0; i < candidates.length; i++) {
          const t = candidates[i];
          if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(t)) return t;
        }
        return "";
      }

      function extForMime(mime) {
        const m = (mime || "").toLowerCase();
        if (m.indexOf("webm") !== -1) return "webm";
        if (m.indexOf("ogg") !== -1) return "ogg";
        return "webm";
      }

      function getAccentHex() {
        return (getComputedStyle(document.documentElement).getPropertyValue("--accent") || "").trim() || "#9a6dd7";
      }

      function hexToRgb(hex) {
        let h = (hex || "").trim();
        if (h.startsWith("#")) h = h.slice(1);
        if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
        const n = parseInt(h, 16);
        const r = (n >> 16) & 255;
        const g = (n >> 8) & 255;
        const b = n & 255;
        return { r: r, g: g, b: b };
      }

      function accentRGBA(alpha) {
        const { r, g, b } = hexToRgb(getAccentHex());
        return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
      }

      async function ensureStream() {
        if (stream) return stream;
        setStatus("Requesting microphone…");
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        return stream;
      }

      function stopRecorder() {
        try { if (recorder && recorder.state !== "inactive") recorder.stop(); } catch (_) {}
        recorder = null;
      }

      function stopStreamTracks() {
        if (stream) stream.getTracks().forEach(function (t) { try { t.stop(); } catch (_) {} });
        stream = null;
      }

      async function startRecording() {
        if (isRecording || manualMode) return;
        try {
          await ensureStream();
          const mime = pickMimeType();
          chunks = [];
          rollingMode = true;
          recorder = new MediaRecorder(stream, mime ? { mimeType: mime } : undefined);
          recorder.ondataavailable = function (e) {
            if (e.data && e.data.size > 0) {
              chunks.push(e.data);
              while (chunks.length > CAPTURE_DURATION_SEC) chunks.shift(); // 1 chunk/sec
            }
          };
          recorder.start(1000);
          isRecording = true;
          startBtn.textContent = "⏹ Stop 30s buffer";
          captureBtn.disabled = false;
          manualStartBtn.disabled = true;
          setStatus("Recording last 30s. When ready, click Capture last 30s.");
        } catch (err) {
          setStatus("Microphone access denied or unavailable.", true);
        }
      }

      function stopRecording() {
        if (!isRecording) return;
        stopRecorder();
        stopStreamTracks();
        chunks = [];
        isRecording = false;
        rollingMode = false;
        startBtn.textContent = "▶ Start 30s buffer";
        captureBtn.disabled = true;
        setStatus("Stopped. Start 30s buffer to try again.");
        manualStartBtn.disabled = false;
      }

      async function startManualRecording() {
        if (manualMode || isRecording) return;
        try {
          await ensureStream();
          const mime = pickMimeType();
          chunks = [];
          manualMode = true;
          manualSeconds = 0;
          recorder = new MediaRecorder(stream, mime ? { mimeType: mime } : undefined);
          recorder.ondataavailable = function (e) {
            if (e.data && e.data.size > 0) chunks.push(e.data);
          };
          recorder.start(1000);
          manualTimer = setInterval(function () {
            manualSeconds += 1;
            if (manualSeconds >= MANUAL_MAX_SEC) {
              clearInterval(manualTimer);
              manualTimer = null;
              setStatus("Max 5 min reached. Sending…");
              manualStopAndSend();
            }
          }, 1000);
          manualStartBtn.disabled = true;
          manualStopBtn.disabled = false;
          startBtn.disabled = true;
          captureBtn.disabled = true;
          setStatus("Recording. Take your time — press Stop & send when done (max 5 min).");
        } catch (err) {
          setStatus("Microphone access denied or unavailable.", true);
        }
      }

      function stopManualRecording() {
        if (!manualMode) return;
        if (manualTimer) { clearInterval(manualTimer); manualTimer = null; }
        stopRecorder();
        stopStreamTracks();
        manualMode = false;
        manualStartBtn.disabled = false;
        manualStopBtn.disabled = true;
        startBtn.disabled = false;
        captureBtn.disabled = true;
      }

      // Aggregate wheel_flavors by category: { categoryName: [descriptor1, descriptor2, ...] }
      function aggregateWheelFlavors(wheelFlavors) {
        const byCat = {};
        WHEEL_CATEGORIES.forEach(function (c) { byCat[c] = []; });
        (wheelFlavors || []).forEach(function (entry) {
          const cat = entry.category;
          if (!byCat[cat]) byCat[cat] = [];
          const descField = uiLang === "zh" ? "descriptors_zh" : "descriptors_en";
          const descriptors = entry[descField] || entry.descriptors || [];
          (descriptors || []).forEach(function (d) {
            if (d && byCat[cat].indexOf(d) === -1) byCat[cat].push(d);
          });
        });
        return byCat;
      }

      function drawTastingWheel(wheelFlavors) {
        const byCat = aggregateWheelFlavors(wheelFlavors);
        wheelFan.innerHTML = "";
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("viewBox", "0 0 260 260");
        svg.setAttribute("aria-label", "Tasting wheel by flavor");
        svg.setAttribute("class", "wheel-svg");

        const cx = 130;
        const cy = 130;
        const innerR = 20;
        const outerR = 95;
        const n = WHEEL_CATEGORIES.length;
        const segmentRad = (2 * Math.PI) / n;
        const startRad = -Math.PI / 2;
        const paths = [];
        function rad2xy(rad, r) {
          return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
        }
        function segmentPath(a0, a1) {
          const p1 = rad2xy(a0, innerR);
          const p2 = rad2xy(a0, outerR);
          const p3 = rad2xy(a1, outerR);
          const p4 = rad2xy(a1, innerR);
          const largeArc = 0;
          const sweep = 1;
          return "M " + p1.x + " " + p1.y + " L " + p2.x + " " + p2.y + " A " + outerR + " " + outerR + " 0 " + largeArc + " " + sweep + " " + p3.x + " " + p3.y + " L " + p4.x + " " + p4.y + " A " + innerR + " " + innerR + " 0 " + largeArc + " 0 " + p1.x + " " + p1.y + " Z";
        }

        for (let i = 0; i < n; i++) {
          const cat = WHEEL_CATEGORIES[i];
          const descriptors = byCat[cat] || [];
          const lit = descriptors.length > 0;
          const midRad = startRad + (i + 0.5) * segmentRad;
          const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
          path.setAttribute("d", segmentPath(midRad, midRad));
          path.setAttribute("fill", lit ? (WHEEL_COLORS[cat] || "#888") : "rgba(255,255,255,0.05)");
          path.setAttribute("stroke", lit ? "rgba(255,255,255,0.35)" : "rgba(255,255,255,0.08)");
          path.setAttribute("stroke-width", "0.8");
          svg.appendChild(path);
          paths.push({ path: path, midRad: midRad, halfSpan: segmentRad / 2 });
          const labelR = outerR + 14;
          const labelPos = rad2xy(midRad, labelR);
          const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
          text.setAttribute("x", labelPos.x);
          text.setAttribute("y", labelPos.y);
          text.setAttribute("text-anchor", "middle");
          text.setAttribute("dominant-baseline", "middle");
          text.setAttribute("fill", lit ? (WHEEL_COLORS[cat] || getAccentHex()) : "#6a6a6e");
          text.setAttribute("font-size", "9");
          text.setAttribute("font-weight", lit ? "600" : "400");
          text.setAttribute("opacity", "0");
          const catLabel = uiLang === "zh" ? (WHEEL_LABELS.zh[cat] || cat) : (WHEEL_LABELS.en[cat] || cat);
          text.textContent = catLabel;
          svg.appendChild(text);
          if (lit && descriptors.length) {
            const descR = (innerR + outerR) / 2;
            const descPos = rad2xy(midRad, descR);
            const descText = document.createElementNS("http://www.w3.org/2000/svg", "text");
            descText.setAttribute("x", descPos.x);
            descText.setAttribute("y", descPos.y);
            descText.setAttribute("text-anchor", "middle");
            descText.setAttribute("dominant-baseline", "middle");
            descText.setAttribute("fill", "#e6e6e8");
            descText.setAttribute("font-size", "7");
            descText.setAttribute("opacity", "0");
            descText.textContent = descriptors.slice(0, 3).join(", ") + (descriptors.length > 3 ? "…" : "");
            svg.appendChild(descText);
          }
        }
        wheelFan.appendChild(svg);

        const durationMs = 650;
        const start = performance.now();
        function tick(now) {
          const elapsed = now - start;
          const t = elapsed >= durationMs ? 1 : (elapsed / durationMs);
          const ease = 1 - Math.pow(1 - t, 1.5);
          paths.forEach(function (item) {
            const a0 = item.midRad - item.halfSpan * ease;
            const a1 = item.midRad + item.halfSpan * ease;
            item.path.setAttribute("d", segmentPath(a0, a1));
          });
          if (t < 1) {
            requestAnimationFrame(tick);
          } else {
            svg.querySelectorAll("text").forEach(function (el) { el.setAttribute("opacity", "1"); });
          }
        }
        requestAnimationFrame(tick);
      }

      function drawRadar(radar) {
        if (!radar || !radar.length) return;
        const cx = 130;
        const cy = 130;
        const maxR = 100;
        const minR = 8;
        const n = radar.length;
        const scale = (score) => {
          const v = Math.max(0, Math.min(5, score || 0));
          return minR + (v / 5) * (maxR - minR);
        };

        radarSvg.innerHTML = "";

        for (let level = 1; level <= 5; level++) {
          const r = minR + (level / 5) * (maxR - minR);
          const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          circle.setAttribute("cx", cx);
          circle.setAttribute("cy", cy);
          circle.setAttribute("r", r);
          circle.setAttribute("fill", "none");
          circle.setAttribute("stroke", "rgba(255,255,255,0.1)");
          circle.setAttribute("stroke-width", "0.5");
          radarSvg.appendChild(circle);
        }

        const targetPoints = [];
        for (let i = 0; i < n; i++) {
          const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
          const r = scale(radar[i].score);
          targetPoints.push({ x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) });
          const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
          line.setAttribute("x1", cx);
          line.setAttribute("y1", cy);
          line.setAttribute("x2", cx + maxR * Math.cos(angle));
          line.setAttribute("y2", cy + maxR * Math.sin(angle));
          line.setAttribute("stroke", "rgba(255,255,255,0.12)");
          line.setAttribute("stroke-width", "0.5");
          radarSvg.appendChild(line);
          const labelR = maxR + 16;
          const lx = cx + labelR * Math.cos(angle);
          const ly = cy + labelR * Math.sin(angle);
          const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
          text.setAttribute("x", lx);
          text.setAttribute("y", ly);
          text.setAttribute("text-anchor", "middle");
          text.setAttribute("dominant-baseline", "middle");
          text.setAttribute("fill", "#8a8a8e");
          text.setAttribute("font-size", "9");
          text.textContent = radar[i].name;
          radarSvg.appendChild(text);
        }

        const polygon = document.createElementNS("http://www.w3.org/2000/svg", "path");
        polygon.setAttribute("fill", accentRGBA(0.22));
        polygon.setAttribute("stroke", accentRGBA(0.85));
        polygon.setAttribute("stroke-width", "2");
        polygon.setAttribute("stroke-linejoin", "round");
        polygon.setAttribute("stroke-linecap", "round");
        polygon.setAttribute("class", "radar-polygon");
        radarSvg.appendChild(polygon);

        function setPath(t) {
          const points = targetPoints.map(function (p) {
            return { x: cx + (p.x - cx) * t, y: cy + (p.y - cy) * t };
          });
          const d = points.map((p, i) => (i === 0 ? "M" : "L") + p.x + "," + p.y).join(" ") + " Z";
          polygon.setAttribute("d", d);
        }

        setPath(0);
        const durationMs = 1000;
        function startRadarAnimation() {
          const start = performance.now();
          function tick(now) {
            const elapsed = now - start;
            const t = elapsed >= durationMs ? 1 : (elapsed / durationMs);
            const ease = 1 - Math.pow(1 - t, 2);
            setPath(ease);
            if (t < 1) requestAnimationFrame(tick);
          }
          requestAnimationFrame(tick);
        }
        requestAnimationFrame(function () {
          requestAnimationFrame(startRadarAnimation);
        });
      }

      function drawLegend(wheelFlavors, radar) {
        wheelLegend.innerHTML = "";
        const byCat = aggregateWheelFlavors(wheelFlavors);
        WHEEL_CATEGORIES.forEach(function (cat) {
          const desc = byCat[cat];
          if (desc && desc.length) {
            const span = document.createElement("span");
            span.className = "legend-wheel";
            const catLabel = uiLang === "zh" ? (WHEEL_LABELS.zh[cat] || cat) : (WHEEL_LABELS.en[cat] || cat);
            span.innerHTML = '<span class="dot" style="background:' + (WHEEL_COLORS[cat] || "#888") + '"></span> ' + catLabel + ": " + desc.join(", ");
            wheelLegend.appendChild(span);
          }
        });
        if (radar && radar.length) {
          const span = document.createElement("span");
          span.className = "legend-radar";
          span.innerHTML = "Radar: " + radar.map(function (r) { return r.name + " " + r.score + "/5"; }).join(" · ");
          wheelLegend.appendChild(span);
        }
      }

      function getTextSummaryByLang(data) {
        if (uiLang === "zh") return data.text_summary_zh || data.text_summary || "(no summary)";
        return data.text_summary_en || data.text_summary || "(no summary)";
      }

      function renderResult(data) {
        lastResultData = data;
        transcriptionEl.textContent = data.transcription || "(no transcription)";
        textSummaryEl.textContent = getTextSummaryByLang(data);
        const wheelFlavors = data.wheel_flavors || [];
        const radar = data.radar || [];
        drawTastingWheel(wheelFlavors);
        drawRadar(radar);
        drawLegend(wheelFlavors, radar);
        resultEl.hidden = false;
      }

      function showCaptureView() {
        captureView.hidden = false;
        repertoireView.hidden = true;
        navCapture.classList.add("active");
        navRepertoire.classList.remove("active");
      }

      function showRepertoireView() {
        captureView.hidden = true;
        repertoireView.hidden = false;
        navCapture.classList.remove("active");
        navRepertoire.classList.add("active");
        repertoireList.hidden = false;
        repertoireBack.hidden = true;
        resultEl.hidden = true;
        loadRepertoireList();
      }

      async function loadRepertoireList() {
        repertoireList.innerHTML = "";
        setStatus("Loading repertoire…");
        try {
          const res = await fetch("/api/notes");
          if (!res.ok) throw new Error("Failed to load notes");
          const data = await res.json();
          const notes = data.notes || [];
          setStatus("");
          if (notes.length === 0) {
            repertoireList.innerHTML = "<p style='color:#8a8a8e;font-size:0.9rem;'>No notes yet. Capture a tasting to see it here.</p>";
            return;
          }
          const ul = document.createElement("ul");
          ul.className = "repertoire-list";
          notes.forEach(function (note) {
            const li = document.createElement("li");
            li.dataset.id = note.id;
            const snippet = uiLang === "zh" ? (note.snippet_zh || note.snippet) : (note.snippet_en || note.snippet);
            const title = (note.product_name && note.product_name.trim()) ? note.product_name.trim() : snippet || "(No title)";
            const date = note.created_at ? new Date(note.created_at).toLocaleDateString(undefined, { dateStyle: "medium" }) : "";
            li.innerHTML = "<span class=\"note-title\">" + escapeHtml(title) + "</span><br><span class=\"note-meta\">" + escapeHtml(date) + "</span>";
            li.addEventListener("click", function () { openNote(note.id); });
            ul.appendChild(li);
          });
          repertoireList.appendChild(ul);
        } catch (err) {
          setStatus(err.message || "Could not load list.", true);
        }
      }

      function escapeHtml(s) {
        if (!s) return "";
        const div = document.createElement("div");
        div.textContent = s;
        return div.innerHTML;
      }

      async function openNote(noteId) {
        setStatus("Loading…");
        try {
          const res = await fetch("/api/notes/" + encodeURIComponent(noteId));
          if (!res.ok) throw new Error(res.status === 404 ? "Note not found" : "Failed to load note");
          const data = await res.json();
          setStatus("");
          repertoireList.hidden = true;
          repertoireBack.hidden = false;
          renderResult(data);
        } catch (err) {
          setStatus(err.message || "Could not load note.", true);
        }
      }

      async function sendAudioBlob(wavBlob) {
        if (!wavBlob || wavBlob.size < 500) {
          setStatus("No audio to send (record at least a second).", true);
          return;
        }
        manualStopBtn.disabled = true;
        captureBtn.disabled = true;
        setStatus("Sending and processing…");
        resultEl.hidden = true;
        try {
          const formData = new FormData();
          const ext = extForMime(wavBlob.type);
          formData.append("audio", wavBlob, "capture." + ext);
          const res = await fetch("/api/capture", { method: "POST", body: formData });
          if (!res.ok) {
            const err = await res.text();
            let msg = "Request failed: " + res.status;
            if (err && err.trim()) {
              try {
                const j = JSON.parse(err);
                if (j.detail) msg = j.detail;
                else msg = err.trim();
              } catch (_) {
                msg = err.trim();
              }
            }
            throw new Error(msg);
          }
          const data = await res.json();
          renderResult(data);
          setStatus("Done.");
        } catch (err) {
          setStatus(err.message || "Something went wrong.", true);
        } finally {
          captureBtn.disabled = !isRecording;
          manualStopBtn.disabled = manualMode;
        }
      }

      async function captureAndSend() {
        if (!isRecording || !rollingMode || !chunks.length) {
          setStatus("Start 30s buffer first, then capture.", true);
          return;
        }
        const mime = (recorder && recorder.mimeType) ? recorder.mimeType : (chunks[0] && chunks[0].type) || "audio/webm";
        const blob = new Blob(chunks.slice(0), { type: mime });
        await sendAudioBlob(blob);
      }

      async function manualStopAndSend() {
        if (!manualMode) return;
        if (manualTimer) { clearInterval(manualTimer); manualTimer = null; }
        stopRecorder();
        stopStreamTracks();
        manualMode = false;
        manualStartBtn.disabled = false;
        const mime = (recorder && recorder.mimeType) ? recorder.mimeType : (chunks[0] && chunks[0].type) || "audio/webm";
        const blob = new Blob(chunks.slice(0), { type: mime });
        chunks = [];
        await sendAudioBlob(blob);
        manualStopBtn.disabled = true;
        startBtn.disabled = false;
        captureBtn.disabled = true;
      }

      navCapture.addEventListener("click", function (e) { e.preventDefault(); showCaptureView(); });
      navRepertoire.addEventListener("click", function (e) { e.preventDefault(); showRepertoireView(); });
      document.getElementById("backToList").addEventListener("click", function (e) {
        e.preventDefault();
        repertoireList.hidden = false;
        repertoireBack.hidden = true;
        resultEl.hidden = true;
        loadRepertoireList();
      });

      function applyLang() {
        uiLang = uiLang === "zh" ? "zh" : "en";
        langToggle.textContent = uiLang === "zh" ? "中文" : "EN";
        navCapture.textContent = uiLang === "zh" ? "錄音" : "Capture";
        navRepertoire.textContent = uiLang === "zh" ? "酒單" : "Repertoire";
        if (modeLabelEl) modeLabelEl.textContent = uiLang === "zh" ? "录音准备就绪" : "Record when ready";
        manualStartBtn.textContent = uiLang === "zh" ? "▶ 开始手动录音" : "▶ Start manual record";
        manualStopBtn.textContent = uiLang === "zh" ? "⏹ 停止并发送" : "⏹ Stop & send";
        if (backToListLink) backToListLink.textContent = uiLang === "zh" ? "← 返回列表" : "← Back to list";
        if (resultWhatEl) resultWhatEl.textContent = uiLang === "zh" ? "你说了什么" : "What you said";
        if (resultSummaryEl) resultSummaryEl.textContent = uiLang === "zh" ? "品鉴摘要" : "Tasting summary";
        if (lastResultData && !resultEl.hidden) {
          textSummaryEl.textContent = getTextSummaryByLang(lastResultData);
          drawTastingWheel(lastResultData.wheel_flavors || []);
          drawLegend(lastResultData.wheel_flavors || [], lastResultData.radar || []);
        }
      }
      applyLang();
      langToggle.addEventListener("click", function () {
        uiLang = uiLang === "zh" ? "en" : "zh";
        localStorage.setItem("uiLang", uiLang);
        applyLang();
        if (!repertoireView.hidden) loadRepertoireList();
      });

      startBtn.addEventListener("click", function () {
        if (isRecording) stopRecording();
        else startRecording().then(function () { if (isRecording) captureBtn.focus(); });
      });
      captureBtn.addEventListener("click", captureAndSend);
      manualStartBtn.addEventListener("click", startManualRecording);
      manualStopBtn.addEventListener("click", manualStopAndSend);
      window.addEventListener("beforeunload", function () {
        stopRecording();
        stopManualRecording();
      });
    })();
  </script>
</body>
</html>
